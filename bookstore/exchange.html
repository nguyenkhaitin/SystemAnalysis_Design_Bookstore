<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tri thức Book Store</title>
    <!-- Link icon web -->
    <link rel="icon" type="image/x-icon" href="assets/img/Tri thức (1).png" />
    <!-- Link fontawesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Link grid -->
    <link rel="stylesheet" href="assets/css/grid.css" />
    <!-- Link css -->
    <link rel="stylesheet" href="assets/css/exchange.css" />
    <!-- Link responsive header -->
    <link rel="stylesheet" href="assets/responsive/header.css" />
  </head>
        <!-- Liên kết Swiper CSS -->
<link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />

<!-- Liên kết Swiper JS -->
<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <body>
    <body id="top">
      <div class="loader"></div>
      <div id="main" class="grid wide">
        <!-- Header -->
        <div id="header" class="modal">
          <div class="header__element">
            <div class="header__close js-close">
              <i class="fa-solid fa-xmark"></i>
            </div>
            <div class="header__logo">
              <a href="">
                <img src="assets/img/Tri thức (1).png" alt="" />
                <span>Tri thức Book Store</span>
              </a>
            </div>

            <nav class="header__nav">
              <ul class="header__nav-list">
                <li>
                  <a href="index.html"
                    ><i class="fa-solid fa-house"></i>Giới thiệu</a
                  >
                </li>
                <li>
                  <a href="product.html"
                    ><i class="fa-brands fa-servicestack"></i>Sản phẩm</a
                  >
                </li>
                <li>
                  <a href="pay.html"
                    ><i class="fa-solid fa-bag-shopping"></i>Thanh toán</a
                  >
                </li>
              </ul>

              <div class="header__nav-log">
                <a href="login.html"
                  >Đăng nhập
                  <i class="fa-solid fa-person-walking-arrow-loop-left"></i
                ></a>
              </div>
            </nav>
          </div>
        </div>

        <!-- Header for PC low, Tablet and Moblie -->
        <div id="header__responsive">
          <div class="header__responsive-btn js-btn-navbar">
            <i class="fa-solid fa-bars"></i>
          </div>
          <div class="header__responsive-img">
            <img src="assets/img/Tri thức (1).png" alt="" />
            <span>Bookstore</span>
          </div>
          <button class="header__responsive-package">
            <a href="pay.html" style="color: lightskyblue">
              <i class="fa-solid fa-cart-shopping"></i>
              <span id="exchange_sp"></span>
            </a>
          </button>
        </div>
      <!-- Scrool to top -->
      <div id="scrolltop">
        <a href="#top" class="top-button">
          <i class="fa-solid fa-arrow-up-long"></i>
        </a>
      </div>

      <!-- Javascript scroll to top -->
      <script>
        const scrollTop = document.getElementById("scrolltop");
        window.onload = () => {
          scrollTop.style.visibility = "hidden";
          scrollTop.style.opacity = 0;
        };

        window.onscroll = () => {
          if (window.scrollY > 200) {
            scrollTop.style.visibility = "visible";
            scrollTop.style.opacity = 1;
          } else {
            scrollTop.style.visibility = "hidden";
            scrollTop.style.opacity = 0;
          }
        };
      </script>

      <!-- Javascript loader -->
      <script>
        window.addEventListener("load", () => {
          const loader = document.querySelector(".loader");

          loader.classList.add("loader--hidden");

          loader.addEventListener("transitionend", () => {
            document.body.removeChild(document.querySelector(".loader"));
          });
        });
      </script>

      <!-- Header sticky -->
      <script>
        window.addEventListener("scroll", function () {
          var header = this.document.querySelector("#header__responsive");
          header.classList.toggle("sticky", this.window.scrollY > 0);
        });
      </script>

      <!-- Javascript Header responsive navbar -->
      <script src="assets/javascript/navbar.js"></script>

      <!-- Javascript tree -->
      <script src="assets/javascript/exchange.js"></script>

      <script>
        document.addEventListener("DOMContentLoaded", function () {
          var mySwiper = new Swiper(".swiper-container", {
            // Các tham số tùy chọn
            loop: true,
            autoplay: {
              delay: 5000, // Độ trễ 5 giây giữa các slide
            },
            
            // Nếu bạn cần pagination
            pagination: {
              el: ".swiper-pagination",
              clickable: true,
            },
            
            // Mũi tên điều hướng
            navigation: {
              nextEl: ".swiper-button-next",
              prevEl: ".swiper-button-prev",
            },
          });
        });
      </script>
      
    </body>
  </body>
</html>
